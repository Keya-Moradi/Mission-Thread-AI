name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default: this workflow only reads the repository, never
# writes to it, opens PRs, or touches other GitHub resources.
permissions:
  contents: read

env:
  AI_MODE: mock
  # Deliberately non-secret — this only ever runs against the ephemeral
  # Postgres service container below, never a real deployment.
  AUTH_SECRET: "ci-only-secret-not-used-outside-this-workflow"
  DATABASE_URL: "postgresql://missionthread:ci_test_password@localhost:5432/missionthread_test"
  TEST_DATABASE_URL: "postgresql://missionthread:ci_test_password@localhost:5432/missionthread_test"
  # Deliberately NOT set at workflow level: ALLOW_DESTRUCTIVE_DATABASE_OPERATION
  # and MISSIONTHREAD_SEED_SCOPE are supplied only on the one step below that
  # actually needs them — see packages/core/src/db-safety.ts.

jobs:
  build:
    runs-on: ubuntu-latest

    # A dedicated CI database, isolated to this job's ephemeral container —
    # never the developer's local dev/test database. host:port/database
    # exactly matches GITHUB_ACTIONS_TEST_TARGETS in
    # packages/core/src/db-safety.ts, which only matches when
    # GITHUB_ACTIONS=true — a variable GitHub Actions sets automatically for
    # every job (unlike the generic CI variable, which other tools also set
    # and so cannot uniquely identify this runner), so it's not set
    # explicitly here.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: missionthread
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: missionthread_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run db:validate --workspace @missionthread/core

      - name: Generate Prisma client
        run: npm run db:generate --workspace @missionthread/core

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Migrate CI test database
        run: npm run db:migrate:deploy --workspace @missionthread/core

      - name: Seed CI test database
        run: npm run db:seed:github-actions:internal

      # Phase 2 added database-backed tests (packages/core/src/analysis) —
      # they need the CI database migrated and seeded first, which unit
      # tests alone previously didn't (see docs/DECISIONS.md).
      - name: Unit and integration tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Application smoke test
        run: npm run smoke --workspace @missionthread/web
